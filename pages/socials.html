<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socials | Stereo Entertainment</title>

    <meta content="Socials | Stereo Entertainment" property="og:title" />
    <meta content="Check out our socials!" property="og:description" />
    <meta content="https://stereoentertainment.github.io/" property="og:url" />
    <meta content="https://stereoentertainment.github.io/static/images/icon.png" property="og:image" />
    <meta content="#7E50CEFF" data-react-helmet="true" name="theme-color" />

    <link rel="icon" type="image/x-icon" href="../static/images/icon.png">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
<header>
    <div class="headericon-wrap">
        <img src="../static/images/icon.png" class="headericon"></img>

        <button onclick="homeRedir()">Home</button>
        <button onclick="gamesRedir()">Games</button>

        <img src="../static/images/bannerlong.png" alt="Stereo Entertainment Banner" class="banner-img">
    </div>

    <div class="wrap">
        <section>
            <div class="card">
                <h1 style="text-align: center">Socials</h1>
                <hr>

                <div class="grid5x5">
                    <button class="box" onclick="discordRedir()">
                        <img src="../static/images/socials/discord.png" alt="discord">
                    </button>

                    <button class="box" onclick="youtubeRedir()">
                        <img src="../static/images/socials/youtube.png" alt="discord">
                    </button>

                    <button class="box" onclick="itchRedir()">

                    </button>

                    <button class="box" onclick="steamRedir()">
                        <img src="../static/images/socials/steam.webp" alt="discord">

                    <button class="box" onclick="githubRedir()">

<footer>

    </div>

<script>
    function homeRedir() {
        location.href = "../index.html";
    }

    function ourteamRedir() {
        location.href = "ourteam.html";
    }

    function socialsRedir() {
        location.href = "socials.html";
    }

    function gamesRedir() {
        location.href = "games.html";
    }

    function discordRedir() {
        window.location.href = "https://discord.gg/HgT5sWJQBh";
    }

    function youtubeRedir() {
        window.location.href = "https://www.youtube.com/@StereoEntertainmentStudio";

    function steamRedir() {
        window.location.href = "https://store.steampowered.com/curator/46213072/";
    }
